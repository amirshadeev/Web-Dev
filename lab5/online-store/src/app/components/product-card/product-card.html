<div class="card">

  <!-- 🔥 Галерея -->
  <div class="gallery">
    <img class="main-img" [src]="currentImage" alt="product" />

    <div class="nav">
      <button (click)="prevImage()">❮</button>
      <button (click)="nextImage()">❯</button>
    </div>

    <div class="thumbnails">
      <img
        *ngFor="let img of product.images; let i = index"
        [src]="img"
        [class.active]="i === currentImageIndex"
        (click)="selectImage(i)"
      />
    </div>
  </div>

  <!-- Название и описание -->
  <h2>{{ product.name }}</h2>
  <p>{{ product.description }}</p>

  <!-- Цена -->
  <p class="price">{{ product.price }} ₸</p>

  <!-- ⭐ Rating -->
  <div class="rating">
    <ng-container *ngFor="let star of starsArray; let i = index">
      <span [class.filled]="i < product.rating">★</span>
    </ng-container>
    <span class="numeric">({{ product.rating }})</span>
  </div>

  <!-- Kaspi link -->
  <a [href]="product.link" target="_blank">Kaspi</a>

  <!-- Like / Delete / Share -->
  <div class="buttons">
    <button (click)="like()">❤ {{ product.likes }}</button>
    <button id="delpepe" (click)="remove()">Delete</button>
    <button id="dada" (click)="shareWhatsapp()">WhatsApp</button>
    <button (click)="shareTelegram()">Telegram</button>
  </div>

</div>
